<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Homes Collection</title>
    
    <!-- Premium Google Fonts for an editorial feel -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        /* 1. Global Reset & Theme Styling */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0B1D17; /* Deep Forest Green */
            color: #D4AF37;           /* Dull Gold */
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* 2. Full-Screen Presentation Sections */
        section {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 4rem 2rem;
            text-align: center;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* 3. Editorial Typography */
        h1 {
            font-family: 'Cinzel', serif;
            font-size: 3.5rem;
            font-weight: 400;
            letter-spacing: 4px;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
        }

        .subtitle {
            font-family: 'Inter', sans-serif;
            font-size: 1.2rem;
            font-weight: 300;
            color: #A3B19B; /* Muted Sage Grey */
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 3rem;
        }

        p {
            font-size: 1.1rem;
            font-weight: 300;
            color: #F5F5F5;
            max-width: 650px;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <!-- Slide 1: The Hero Title -->
    <section id="hero">
        <div class="container">
            <h1>One Homes Collection</h1>
            <div class="subtitle">Branded Residences • One Canal Road, Lahore</div>
            <p>A paradigm shift from traditional, low-yield real estate to a professionally managed, high-yield luxury hospitality model.</p>
        </div>
    </section>

</body>
</html>
